name: Node CI + Docker build

on:
  push:
    branches: [ main, LFS ]
  pull_request:
    branches: [ main, LFS ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit --silent || npm install --no-audit --silent

      - name: Run lint (if configured)
        run: |
          npm run lint
        continue-on-error: true

      - name: Run tests (if configured)
        run: |
          npm test --silent
        continue-on-error: true

      - name: Show node & npm versions
        run: |
          node --version
          npm --version

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build server image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.server
          push: false
          tags: ghcr.io/${{ github.repository }}:server-latest
          load: true

      - name: Save image as tar
        run: |
          docker save ghcr.io/${{ github.repository }}:server-latest -o server-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-image
          path: server-image.tar
